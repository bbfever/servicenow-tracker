<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ticket Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif}
h1,h2,h3,h4,h5,h6{font-family:'Fira Sans',sans-serif}
input[type=range]{-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,0.3);cursor:pointer}
input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,0.3);cursor:pointer;border:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const STATUS = { CLOSED: "Closed", CHASED: "Chased" };

const LIGHT = {
  red:"#d61726", bg:"#f2f0f0", card:"#ffffff", border:"#e0e0e0",
  text:"#1e1e1e", textSub:"#616161",
  closedBadge:"#d61726", closedBg:"#f2f0f0", closedText:"#d61726", closedBorder:"#cbcbcb",
  chasedBadge:"#e74d3c", chasedBg:"#f2f0f0", chasedText:"#d61726", chasedBorder:"#cbcbcb",
  filterActive:"#d61726", filterActiveTxt:"#ffffff",
  filterInactive:"#f2f0f0", filterInactiveTxt:"#616161",
  reportBg:"#f2f0f0", reportText:"#1e1e1e", footerText:"#757575",
};
const DARK = {
  red:"#d61726", bg:"#121212", card:"#1e1e1e", border:"#494949",
  text:"#f2f0f0", textSub:"#999999",
  closedBadge:"#d61726", closedBg:"rgba(214,23,38,0.2)", closedText:"#e74d3c", closedBorder:"rgba(214,23,38,0.35)",
  chasedBadge:"#ff4e00", chasedBg:"rgba(255,78,0,0.2)", chasedText:"#ff4e00", chasedBorder:"rgba(255,78,0,0.35)",
  filterActive:"#d61726", filterActiveTxt:"#ffffff",
  filterInactive:"#1e1e1e", filterInactiveTxt:"#999999",
  reportBg:"#121212", reportText:"#e74d3c", footerText:"#696969",
};

// --- Supabase config (stored locally so it works in multiple browsers) ---
const SB_DEFAULT_URL = "https://gehrxompqjktnhubfwbu.supabase.co";
const SB_DEFAULT_KEY = "sb_publishable_8Tw2qXfWLhld8zmx4lphRA_GIH_7ZfN";
const SB_LS_URL = "sn-sb-url";
const SB_LS_KEY = "sn-sb-key";
const SB_LS_TRACKER = "sn-sb-tracker";

function getSbCfg() {
  return {
    url: (localStorage.getItem(SB_LS_URL) || SB_DEFAULT_URL).trim(),
    key: (localStorage.getItem(SB_LS_KEY) || SB_DEFAULT_KEY).trim(),
    trackerKey: (localStorage.getItem(SB_LS_TRACKER) || "default").trim()
  };
}

function utcDateISO() {
  return new Date().toISOString().slice(0, 10);
}

async function sbFetch(method, path, cfg, body) {
  const base = cfg.url.replace(/\/$/, "");
  const url = base + path;

  const headers = {
    "Content-Type":"application/json",
    "apikey": cfg.key,
    "Authorization":"Bearer " + cfg.key,
    "x-tracker-key": cfg.trackerKey
  };

  const res = await fetch(url, {
    method,
    headers,
    body: body ? JSON.stringify(body) : undefined
  });

  if (!res.ok) {
    let detail = "";
    try {
      const ct = res.headers.get("content-type") || "";
      if (ct.includes("application/json")) {
        const j = await res.json();
        detail = j?.message || j?.error || JSON.stringify(j);
      } else {
        detail = await res.text();
      }
    } catch {}
    throw new Error(`Supabase API error: ${res.status}${detail ? " - " + detail : ""}`);
  }

  if (res.status === 204) return null;
  const ct = res.headers.get("content-type") || "";
  if (ct.includes("application/json")) return res.json();
  return res.text();
}

async function sbLoadToday(cfg) {
  const d = utcDateISO();
  return sbFetch("GET", `/rest/v1/tickets?work_date=eq.${d}&order=created_at.desc`, cfg);
}

async function sbInsert(ticketNumber, status, cfg) {
  const payload = {
    ticket_number: ticketNumber,
    status,
    tracker_key: cfg.trackerKey,
    work_date: utcDateISO()
  };
  return sbFetch("POST", "/rest/v1/tickets", cfg, payload);
}

async function sbDeleteToday(cfg) {
  const d = utcDateISO();
  return sbFetch("DELETE", `/rest/v1/tickets?work_date=eq.${d}`, cfg);
}

function mapRowsToTickets(rows) {
  return (rows || []).map(r => ({
    id: r.id || Date.now(),
    number: String(r.ticket_number || "").toUpperCase(),
    status: r.status,
    time: r.created_at || new Date().toISOString()
  }));
}

// --- Extension auto-feed (?ticket=INC...&status=Closed|Chased) ---
function getUrlFeed() {
  try {
    const u = new URL(window.location.href);
    const ticket = (u.searchParams.get("ticket") || "").trim().toUpperCase();
    const statusRaw = (u.searchParams.get("status") || "").trim();
    const s = statusRaw.toLowerCase();
    const status = (s === "closed" || s === "close") ? "Closed" : (s === "chased" || s === "chase") ? "Chased" : "";
    if (!ticket || !status) return null;
    return { ticket, status };
  } catch {
    return null;
  }
}

function clearUrlFeed() {
  try {
    const u = new URL(window.location.href);
    if (u.searchParams.has("ticket") || u.searchParams.has("status")) {
      u.searchParams.delete("ticket");
      u.searchParams.delete("status");
      window.history.replaceState({}, document.title, u.toString());
    }
  } catch {}
}

function formatDateTime(iso) {
  return new Date(iso).toLocaleString("en-GB",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit",second:"2-digit"});
}

function App() {
  const [tickets, setTickets] = useState([]);
  const [input, setInput] = useState("");
  const [pendingStatus, setPendingStatus] = useState(null);
  const [filter, setFilter] = useState("All");
  const [showReport, setShowReport] = useState(false);
  const [loading, setLoading] = useState(true);
  const [toast, setToast] = useState(null);
  const [showResetConfirm, setShowResetConfirm] = useState(false);
  const [dark, setDark] = useState(false);
  const [zoom, setZoom] = useState(100);

  const C = dark ? DARK : LIGHT;
  const scale = zoom / 100;

  useEffect(() => {
    (async () => {
      try {
        if (localStorage.getItem("sn-darkmode") === "true") setDark(true);
        const z = localStorage.getItem("sn-zoom");
        if (z) setZoom(Number(z));

        const cfg = getSbCfg();
        const rows = await sbLoadToday(cfg);
        setTickets(mapRowsToTickets(rows || []));

        // If opened by extension with ?ticket=...&status=..., auto-insert once
        const feed = getUrlFeed();
        if (feed) {
          try { await sbInsert(feed.ticket, feed.status, cfg); } catch {}
          const rows2 = await sbLoadToday(cfg);
          setTickets(mapRowsToTickets(rows2 || []));
          clearUrlFeed();
        }
      } catch (e) {
        // fall back to empty list; user can still use UI
        console.error(e);
      }
      setLoading(false);
    })();
  }, []);

  useEffect(() => {
    if (loading) return;
    const id = setInterval(async () => {
      try {
        const cfg = getSbCfg();
        const rows = await sbLoadToday(cfg);
        setTickets(mapRowsToTickets(rows || []));
      } catch {}
    }, 30000);
    return () => clearInterval(id);
  }, [loading]);

  const toggleDark = () => {
    const next = !dark; setDark(next);
    try { localStorage.setItem("sn-darkmode", String(next)); } catch {}
  };

  const handleZoom = (e) => {
    const val = Number(e.target.value);
    setZoom(val);
    try { localStorage.setItem("sn-zoom", String(val)); } catch {}
  };

  const save = (updated) => { setTickets(updated); };

  const showToast = (msg, color) => {
    setToast({ msg, color: color || C.text });
    setTimeout(() => setToast(null), 2500);
  };

  const addTicket = (status) => {
    const num = input.trim().toUpperCase();
    if (!num) { setPendingStatus(status); return; }
    submitTicket(num, status);
  };

  const submitTicket = (num, status) => {
    if (!num) return;
    const existing = tickets.find(t => t.number === num);
    if (existing) {
      showToast(`⚠️ ${num} already logged as ${existing.status}`, "#d61726");
      setInput(""); setPendingStatus(null); return;
    }
    const entry = { id:Date.now(), number:num, status, time:new Date().toISOString() };
    // optimistic
    save([entry, ...tickets]);
    setInput(""); setPendingStatus(null);
    showToast(`✓ ${num} marked as ${status}`, status===STATUS.CLOSED ? C.closedBadge : C.chasedBadge);

    // write + refresh from Supabase (authoritative)
    (async () => {
      try {
        const cfg = getSbCfg();
        await sbInsert(num, status, cfg);
        const rows = await sbLoadToday(cfg);
        setTickets(mapRowsToTickets(rows || []));
      } catch (e) {
        console.error(e);
        showToast("Sync failed (Supabase).", "#d61726");
      }
    })();
  };

  const handleKey = (e) => {
    if (e.key==="Enter" && pendingStatus) submitTicket(input.trim().toUpperCase(), pendingStatus);
    else if (e.key==="Enter" && input.trim()) addTicket(pendingStatus||STATUS.CLOSED);
  };

  const removeTicket = (id) => save(tickets.filter(t => t.id !== id));

  const handleReset = () => {
    save([]); setShowReport(false); setShowResetConfirm(false);
    showToast("Tracker reset — clean slate!", C.red);

    (async () => {
      try {
        const cfg = getSbCfg();
        await sbDeleteToday(cfg);
      } catch (e) {
        // If DELETE policy not configured, ignore
      }
      try {
        const cfg = getSbCfg();
        const rows = await sbLoadToday(cfg);
        setTickets(mapRowsToTickets(rows || []));
      } catch {}
    })();
  };

  const closed = tickets.filter(t => t.status===STATUS.CLOSED);
  const chased = tickets.filter(t => t.status===STATUS.CHASED);
  const filtered = filter==="All" ? tickets : tickets.filter(t => t.status===filter);

  const reportText = () => {
    const date = new Date().toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"});
    const generated = formatDateTime(new Date().toISOString());
    let txt = `Daily Ticket Report – ${date}\n`;
    txt += `Generated        : ${generated}\n`;
    txt += `${"─".repeat(44)}\n`;
    txt += `Total Processed  : ${tickets.length}\n`;
    txt += `Closed           : ${closed.length}\n`;
    txt += `Chased           : ${chased.length}\n`;
    if (closed.length) { txt+=`\nClosed Tickets:\n`; closed.forEach(t => txt+=`  • ${t.number.padEnd(16)} ${formatDateTime(t.time)}\n`); }
    if (chased.length) { txt+=`\nChased Tickets:\n`; chased.forEach(t => txt+=`  • ${t.number.padEnd(16)} ${formatDateTime(t.time)}\n`); }
    return txt;
  };

  const copyReport = () => { navigator.clipboard.writeText(reportText()); showToast("Report copied to clipboard!"); };
  const exportTxt = () => {
    const blob = new Blob([reportText()],{type:"text/plain"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `ticket-report-${new Date().toISOString().slice(0,10)}.txt`;
    a.click();
  };

  if (loading) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#f2f0f0",color:"#616161",fontSize:"16px",fontFamily:"'IBM Plex Sans',sans-serif"}}>Loading...</div>
  );

  return (
    <div style={{background:C.bg, minHeight:"100vh", fontFamily:"'IBM Plex Sans',sans-serif", transition:"background 0.2s"}}>

      {/* Top bar */}
      <div style={{background:C.red, padding:"12px 32px", display:"flex", alignItems:"center", justifyContent:"space-between", gap:"16px"}}>
        {/* Left: title */}
        <div style={{display:"flex", alignItems:"center", gap:"12px", flexShrink:0}}>
          <span style={{color:"#fff", fontSize:"18px", fontWeight:"700", fontFamily:"'Fira Sans',sans-serif"}}>Ticket Tracker</span>
          <div style={{width:"1px", height:"20px", background:"rgba(255,255,255,0.3)"}}/>
          <span style={{color:"rgba(255,255,255,0.85)", fontSize:"13px"}}>IT Service Management</span>
        </div>

        {/* Right: controls */}
        <div style={{display:"flex", alignItems:"center", gap:"20px"}}>

          {/* Zoom slider */}
          <div style={{display:"flex", alignItems:"center", gap:"8px"}}>
            <span style={{fontSize:"12px", color:"rgba(255,255,255,0.7)", fontWeight:"500", whiteSpace:"nowrap"}}>A</span>
            <input
              type="range" min="80" max="130" step="5" value={zoom}
              onChange={handleZoom}
              style={{width:"80px", background:"rgba(255,255,255,0.25)", accentColor:"#fff"}}
            />
            <span style={{fontSize:"15px", color:"rgba(255,255,255,0.7)", fontWeight:"600", whiteSpace:"nowrap"}}>A</span>
            <span style={{fontSize:"11px", color:"rgba(255,255,255,0.5)", minWidth:"32px"}}>{zoom}%</span>
          </div>

          <div style={{width:"1px", height:"20px", background:"rgba(255,255,255,0.25)"}}/>

          {/* Dark mode toggle */}
          <div onClick={toggleDark} style={{display:"flex", alignItems:"center", gap:"8px", cursor:"pointer"}}>
            <span style={{fontSize:"12px", color:"rgba(255,255,255,0.8)", fontWeight:"500"}}>{dark?"Dark":"Light"}</span>
            <div style={{width:"44px",height:"24px",borderRadius:"12px",background:dark?"rgba(255,255,255,0.9)":"rgba(0,0,0,0.25)",border:"1px solid rgba(255,255,255,0.4)",position:"relative",transition:"background 0.3s",cursor:"pointer"}}>
              <div style={{width:"18px",height:"18px",borderRadius:"50%",background:dark?"#d61726":"#ffffff",position:"absolute",top:"2px",left:dark?"22px":"2px",transition:"left 0.25s ease, background 0.25s",boxShadow:"0 1px 4px rgba(0,0,0,0.3)"}}/>
            </div>
          </div>

          <div style={{width:"1px", height:"20px", background:"rgba(255,255,255,0.25)"}}/>

          {/* Reset */}
          <button onClick={() => setShowResetConfirm(true)}
            style={{background:"rgba(0,0,0,0.2)",color:"#fff",border:"1px solid rgba(255,255,255,0.3)",fontSize:"13px",padding:"7px 16px",borderRadius:"4px",cursor:"pointer",fontWeight:"500",fontFamily:"'IBM Plex Sans',sans-serif",flexShrink:0}}>
            Reset Day
          </button>
        </div>
      </div>

      {/* Toast */}
      {toast && (
        <div style={{position:"fixed",top:"20px",left:"50%",transform:"translateX(-50%)",background:toast.color,color:"#fff",padding:"10px 24px",borderRadius:"4px",fontSize:"14px",fontWeight:"600",zIndex:999,boxShadow:"0 4px 16px rgba(0,0,0,0.25)"}}>
          {toast.msg}
        </div>
      )}

      {/* Reset Modal */}
      {showResetConfirm && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:50}}>
          <div style={{background:C.card,borderRadius:"4px",padding:"32px",maxWidth:"420px",width:"90%",boxShadow:"0 8px 32px rgba(0,0,0,0.3)"}}>
            <h2 style={{color:C.text,fontSize:"20px",fontWeight:"700",marginBottom:"8px",fontFamily:"'Fira Sans',sans-serif"}}>Reset Tracker?</h2>
            <div style={{width:"40px",height:"3px",background:C.red,marginBottom:"16px"}}/>
            <p style={{color:C.textSub,fontSize:"15px",marginBottom:"24px"}}>This will permanently clear all {tickets.length} ticket{tickets.length!==1?"s":""}. This cannot be undone.</p>
            <div style={{display:"flex",gap:"12px"}}>
              <button onClick={() => setShowResetConfirm(false)}
                style={{flex:1,background:C.border,color:C.text,border:"none",borderRadius:"4px",padding:"12px",fontSize:"15px",cursor:"pointer",fontWeight:"500",fontFamily:"'IBM Plex Sans',sans-serif"}}>Cancel</button>
              <button onClick={handleReset}
                style={{flex:1,background:C.red,color:"#fff",border:"none",borderRadius:"4px",padding:"12px",fontSize:"15px",fontWeight:"700",cursor:"pointer",fontFamily:"'IBM Plex Sans',sans-serif"}}>Yes, Reset</button>
            </div>
          </div>
        </div>
      )}

      {/* Scalable content */}
      <div style={{transformOrigin:"top center", transform:`scale(${scale})`, transition:"transform 0.2s"}}>
        <div style={{maxWidth:"720px", margin:"0 auto", padding:"32px 20px"}}>

          {/* Date */}
          <div style={{marginBottom:"28px"}}>
            <p style={{color:C.textSub, fontSize:"14px"}}>
              {new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}
            </p>
          </div>

          {/* Stats */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"16px",marginBottom:"20px"}}>
            {[
              {label:"Total Processed",count:tickets.length,accent:C.text},
              {label:"Closed",count:closed.length,accent:C.closedBadge},
              {label:"Chased",count:chased.length,accent:C.chasedBadge},
            ].map(s => (
              <div key={s.label} style={{background:C.card,border:`1px solid ${C.border}`,borderTop:`3px solid ${s.accent}`,borderRadius:"4px",padding:"20px",textAlign:"center",transition:"background 0.2s"}}>
                <div style={{fontSize:"40px",fontWeight:"700",color:s.accent,lineHeight:1}}>{s.count}</div>
                <div style={{fontSize:"12px",color:C.textSub,marginTop:"6px",fontWeight:"500"}}>{s.label}</div>
              </div>
            ))}
          </div>

          {/* Input */}
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:"4px",padding:"24px",marginBottom:"16px",transition:"background 0.2s"}}>
            <label style={{display:"block",fontSize:"13px",color:C.textSub,marginBottom:"8px",fontWeight:"600",textTransform:"uppercase",letterSpacing:"0.5px"}}>Ticket Number</label>
            <input
              style={{width:"100%",border:`1px solid ${C.border}`,borderRadius:"4px",padding:"12px 14px",fontSize:"15px",fontFamily:"'IBM Plex Sans',monospace",color:C.text,outline:"none",marginBottom:"14px",background:C.bg,transition:"background 0.2s, color 0.2s"}}
              placeholder="e.g. INC0012345"
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={handleKey}
              onFocus={e => e.target.style.borderColor=C.red}
              onBlur={e => e.target.style.borderColor=C.border}
            />
            {pendingStatus && !input.trim() && (
              <p style={{fontSize:"13px",color:"#d61726",marginBottom:"12px",fontWeight:"500"}}>⚠️ Enter a ticket number above, then click the button again</p>
            )}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}}>
              <button onClick={() => addTicket(STATUS.CLOSED)}
                style={{background:C.closedBadge,color:"#fff",border:"none",borderRadius:"4px",padding:"13px",fontSize:"15px",fontWeight:"600",cursor:"pointer",fontFamily:"'IBM Plex Sans',sans-serif"}}>
                Mark as Closed
              </button>
              <button onClick={() => addTicket(STATUS.CHASED)}
                style={{background:C.chasedBadge,color:"#fff",border:"none",borderRadius:"4px",padding:"13px",fontSize:"15px",fontWeight:"600",cursor:"pointer",fontFamily:"'IBM Plex Sans',sans-serif"}}>
                Mark as Chased
              </button>
            </div>
          </div>

          {/* Ticket List */}
          {tickets.length > 0 && (
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:"4px",padding:"24px",marginBottom:"16px",transition:"background 0.2s"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"16px"}}>
                <div style={{display:"flex",gap:"8px"}}>
                  {["All","Closed","Chased"].map(f => (
                    <button key={f} onClick={() => setFilter(f)}
                      style={{background:filter===f?C.filterActive:C.filterInactive,color:filter===f?C.filterActiveTxt:C.filterInactiveTxt,border:`1px solid ${filter===f?C.filterActive:C.border}`,borderRadius:"4px",padding:"6px 16px",fontSize:"13px",fontWeight:"600",cursor:"pointer",fontFamily:"'IBM Plex Sans',sans-serif"}}>
                      {f}
                    </button>
                  ))}
                </div>
                <span style={{fontSize:"13px",color:C.textSub}}>{filtered.length} ticket{filtered.length!==1?"s":""}</span>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:"8px",maxHeight:"320px",overflowY:"auto"}}>
                {filtered.map(t => {
                  const isC = t.status===STATUS.CLOSED;
                  return (
                    <div key={t.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:isC?C.closedBg:C.chasedBg,border:`1px solid ${isC?C.closedBorder:C.chasedBorder}`,borderRadius:"4px",padding:"12px 14px"}}>
                      <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
                        <span style={{background:isC?C.closedBadge:C.chasedBadge,color:"#fff",fontSize:"11px",fontWeight:"700",padding:"3px 10px",borderRadius:"3px",textTransform:"uppercase",letterSpacing:"0.5px"}}>{t.status}</span>
                        <span style={{fontFamily:"monospace",fontWeight:"700",fontSize:"15px",color:isC?C.closedText:C.chasedText}}>{t.number}</span>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
                        <span style={{fontSize:"12px",color:C.textSub}}>{formatDateTime(t.time)}</span>
                        <button onClick={() => removeTicket(t.id)}
                          style={{background:"none",border:"none",color:C.border,cursor:"pointer",fontSize:"16px",padding:"0 2px",lineHeight:1}}
                          onMouseEnter={e => e.target.style.color=C.red}
                          onMouseLeave={e => e.target.style.color=C.border}>✕</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Report */}
          {tickets.length > 0 && (
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:"4px",padding:"24px",transition:"background 0.2s"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"16px"}}>
                <div>
                  <h2 style={{color:C.text,fontSize:"15px",fontWeight:"700",fontFamily:"'Fira Sans',sans-serif"}}>End of Day Report</h2>
                  <div style={{width:"32px",height:"2px",background:C.red,marginTop:"4px"}}/>
                </div>
                <div style={{display:"flex",gap:"8px"}}>
                  <button onClick={() => setShowReport(!showReport)}
                    style={{background:C.bg,color:C.textSub,border:`1px solid ${C.border}`,borderRadius:"4px",padding:"7px 14px",fontSize:"13px",cursor:"pointer",fontWeight:"500",fontFamily:"'IBM Plex Sans',sans-serif"}}>
                    {showReport?"Hide":"Preview"}
                  </button>
                  <button onClick={copyReport}
                    style={{background:C.bg,color:C.text,border:`1px solid ${C.border}`,borderRadius:"4px",padding:"7px 14px",fontSize:"13px",cursor:"pointer",fontWeight:"500",fontFamily:"'IBM Plex Sans',sans-serif"}}>
                    Copy
                  </button>
                  <button onClick={exportTxt}
                    style={{background:C.red,color:"#fff",border:"none",borderRadius:"4px",padding:"7px 16px",fontSize:"13px",cursor:"pointer",fontWeight:"600",fontFamily:"'IBM Plex Sans',sans-serif"}}>
                    Export .txt
                  </button>
                </div>
              </div>
              {showReport && (
                <pre style={{background:C.reportBg,border:`1px solid ${C.border}`,borderRadius:"4px",padding:"16px",fontSize:"13px",color:C.reportText,fontFamily:"monospace",whiteSpace:"pre-wrap"}}>
                  {reportText()}
                </pre>
              )}
            </div>
          )}

          {tickets.length === 0 && (
            <div style={{textAlign:"center",color:C.textSub,fontSize:"15px",padding:"60px 0",background:C.card,border:`1px solid ${C.border}`,borderRadius:"4px"}}>
              No tickets logged yet — add your first one above.
            </div>
          )}

          <div style={{textAlign:"center",marginTop:"24px",paddingTop:"16px",borderTop:`1px solid ${C.border}`}}>
            <span style={{fontSize:"12px",color:C.footerText}}>IT Service Management — Ticket Tracker</span>
          </div>

        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
