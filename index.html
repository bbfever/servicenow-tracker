function formatDateTime(iso) {
  return new Date(iso).toLocaleString("en-GB",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit",second:"2-digit"});
}

// --- Gist API helpers ---
function getUrlParams(){
  const u = new URL(window.location.href);
  return {
    ticket: (u.searchParams.get("ticket") || "").trim().toUpperCase(),
    status: (u.searchParams.get("status") || "").trim()
  };
}

function normalizeStatus(s){
  const v = String(s||"").toLowerCase();
  if (v === "closed" || v === "close") return "Closed";
  if (v === "chased" || v === "chase") return "Chased";
  return "";
}

// If extension opens the tracker with ?ticket=INC...&status=Closed, store it until we are connected.
function storePendingFromUrl(){
  const p = getUrlParams();
  const status = normalizeStatus(p.status);
  if (!p.ticket || !status) return;
  sessionStorage.setItem("sn-pending-ticket", JSON.stringify({ ticket: p.ticket, status, at: Date.now() }));
}

function consumePending(){
  try{
    const raw = sessionStorage.getItem("sn-pending-ticket");
    if (!raw) return null;
    const obj = JSON.parse(raw);
    sessionStorage.removeItem("sn-pending-ticket");
    return obj;
  }catch{
    sessionStorage.removeItem("sn-pending-ticket");
    return null;
  }
}

function utcDateISO() { return new Date().toISOString().slice(0,10); }
function nowISO() { return new Date().toISOString(); }
function prettyTime(iso){
  try{
    const d = new Date(iso);
    return d.toLocaleString(undefined, { year:"numeric", month:"short", day:"2-digit", hour:"2-digit", minute:"2-digit", second:"2-digit" });
  }catch{ return iso; }
}

async function sbFetch(method, urlBase, publishableKey, trackerKey, path, body){
  const base = (urlBase||"").replace(/\/$/, "");
  const url = base + path;

  const headers = {
    "Content-Type":"application/json",
    "apikey": publishableKey,
    "Authorization": "Bearer " + publishableKey,
    "x-tracker-key": trackerKey || ""
  };

  const res = await fetch(url, {
    method,
    headers,
    body: body ? JSON.stringify(body) : undefined
  });

  if (!res.ok){
    let detail = "";
    try{
      const ct = res.headers.get("content-type") || "";
      if (ct.includes("application/json")){
        const j = await res.json();
        detail = j?.message || j?.error || JSON.stringify(j);
      } else {
        detail = await res.text();
      }
    }catch{}
    throw new Error(`Supabase API error: ${res.status}${detail ? " - " + detail : ""}`);
  }

  if (res.status === 204) return null;
  const ct = res.headers.get("content-type") || "";
  if (ct.includes("application/json")) return await res.json();
  return await res.text();
}

async function loadToday(cfg){
  const d = utcDateISO();
  // PostgREST filter: work_date=eq.YYYY-MM-DD
  return sbFetch("GET", cfg.url, cfg.key, cfg.trackerKey, `/rest/v1/tickets?work_date=eq.${d}&order=created_at.desc`);
}

async function insertTicket(cfg, ticketNumber, status){
  const payload = {
    ticket_number: ticketNumber,
    status,
    tracker_key: cfg.trackerKey,
    work_date: utcDateISO()
  };
  // Prefer representation so we can see the inserted row
  return sbFetch("POST", cfg.url, cfg.key, cfg.trackerKey, `/rest/v1/tickets`, payload);
}

async function deleteToday(cfg){
  const d = utcDateISO();
  return sbFetch("DELETE", cfg.url, cfg.key, cfg.trackerKey, `/rest/v1/tickets?work_date=eq.${d}`);
}


function utcDateISO() {
  return new Date().toISOString().slice(0, 10); // YYYY-MM-DD in UTC
}

function mapRowsToTickets(rows) {
  return (rows || []).map(r => ({
    id: r.id || Date.now(),
    number: String(r.ticket_number || r.number || "").toUpperCase(),
    status: r.status,
    time: r.created_at || r.time || new Date().toISOString()
  }));

// --- Setup Screen ---
function SetupScreen({ onComplete, dark }) {
  const C = dark ? DARK : LIGHT;
  const [sbUrl, setSbUrl] = useState(localStorage.getItem("sn-sb-url") || "https://gehrxompqjktnhubfwbu.supabase.co");
  const [sbKey, setSbKey] = useState(localStorage.getItem("sn-sb-key") || "sb_publishable_8Tw2qXfWLhld8zmx4lphRA_GIH_7ZfN");
  const [trackerKey, setTrackerKey] = useState(localStorage.getItem("sn-sb-tracker") || "default");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const pendingPreview = useMemo(() => {
    try { return JSON.parse(sessionStorage.getItem("sn-pending-ticket") || "null"); } catch { return null; }
  }, []);

  const handleConnect = async () => {
    const cfg = { url: sbUrl.trim(), key: sbKey.trim(), trackerKey: trackerKey.trim() };
    if (!cfg.url) { setError("Please enter your Supabase Project URL."); return; }
    if (!cfg.key) { setError("Please enter your Supabase Publishable key."); return; }
    if (!cfg.trackerKey) { setError("Please enter a tracker key (shared passphrase)."); return; }

    setLoading(true); setError("");
    try {
      const rows = await loadToday(cfg);
      localStorage.setItem("sn-sb-url", cfg.url);
      localStorage.setItem("sn-sb-key", cfg.key);
      localStorage.setItem("sn-sb-tracker", cfg.trackerKey);
      onComplete(cfg, mapRowsToTickets(rows || []));
    } catch (e) {
      setError(String(e && e.message ? e.message : e || "Could not connect to Supabase."));
    }
    setLoading(false);
  };

  return (
    <div style={{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'IBM Plex Sans',sans-serif"}}>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderTop:`3px solid ${C.red}`,borderRadius:"4px",padding:"40px",maxWidth:"480px",width:"90%"}}>
        <h1 style={{color:C.text,fontSize:"20px",fontWeight:"700",marginBottom:"6px"}}>Connect Ticket Tracker</h1>
        <div style={{width:"40px",height:"2px",background:C.red,marginBottom:"20px"}}/>
        <p style={{color:C.textSub,fontSize:"14px",marginBottom:"18px",lineHeight:1.6}}>
          To sync your tickets across browsers, connect to Supabase. Use the same tracker key in every browser.
        </p>

        {pendingPreview && pendingPreview.ticket && pendingPreview.status && (
          <div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:"4px",padding:"12px",marginBottom:"16px",fontSize:"13px",color:C.textSub,lineHeight:1.6}}>
            Pending from extension: <strong style={{color:C.text}}>{pendingPreview.ticket}</strong> ({pendingPreview.status})
          </div>
        )}

        <label style={{display:"block",fontSize:"12px",color:C.textSub,fontWeight:"600",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"8px"}}>
          Supabase Project URL
        </label>
        <input type="text" value={sbUrl} onChange={e => setSbUrl(e.target.value)}
          style={{width:"100%",padding:"12px 14px",fontSize:"14px",fontFamily:"monospace",border:`1px solid ${C.border}`,borderRadius:"4px",background:C.inputBg,color:C.text,outline:"none",marginBottom:"12px"}} />

        <label style={{display:"block",fontSize:"12px",color:C.textSub,fontWeight:"600",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"8px"}}>
          Supabase Publishable key
        </label>
        <input type="password" value={sbKey} onChange={e => setSbKey(e.target.value)}
          style={{width:"100%",padding:"12px 14px",fontSize:"14px",fontFamily:"monospace",border:`1px solid ${C.border}`,borderRadius:"4px",background:C.inputBg,color:C.text,outline:"none",marginBottom:"12px"}} />

        <label style={{display:"block",fontSize:"12px",color:C.textSub,fontWeight:"600",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"8px"}}>
          Tracker key (shared passphrase)
        </label>
        <input type="password" value={trackerKey} onChange={e => setTrackerKey(e.target.value)}
          onKeyDown={e => e.key === "Enter" && handleConnect()}
          style={{width:"100%",padding:"12px 14px",fontSize:"14px",fontFamily:"monospace",border:`1px solid ${C.border}`,borderRadius:"4px",background:C.inputBg,color:C.text,outline:"none",marginBottom:"12px"}} />

        {error && <p style={{color:"#ef4444",fontSize:"13px",marginBottom:"12px"}}>{error}</p>}

        <button onClick={handleConnect} disabled={loading}
          style={{width:"100%",background:C.red,color:"#fff",border:"none",borderRadius:"4px",padding:"13px",fontSize:"15px",fontWeight:"700",cursor:loading?"not-allowed":"pointer",fontFamily:"'IBM Plex Sans',sans-serif",opacity:loading?0.7:1}}>
          {loading ? "Connecting..." : "Connect"}
        </button>
      </div>
    </div>
  );
}


// --- Main App ---
function App() {
  const [cfg, setCfg] = useState(null);

  const onComplete = (cfg, initialTickets) => {
    setCfg(cfg);
    setTickets(initialTickets || []);
    setLoading(false);
  };

  useEffect(() => {
    const url = localStorage.getItem("sn-sb-url");
    const key = localStorage.getItem("sn-sb-key");
    const trackerKey = localStorage.getItem("sn-sb-tracker");
    if (url && key && trackerKey && !cfg) {
      setCfg({ url, key, trackerKey });
    }
  }, []);


  const [tickets, setTickets]             = useState([]);
  const [input, setInput]                 = useState("");
  const [pendingStatus, setPendingStatus] = useState(null);
  const [filter, setFilter]               = useState("All");
  const [showReport, setShowReport]       = useState(false);
  const [loading, setLoading]             = useState(true);
  const [syncing, setSyncing]             = useState(false);
  const [syncError, setSyncError]         = useState("");
  const [toast, setToast]                 = useState(null);
  const [showResetConfirm, setShowResetConfirm] = useState(false);
  const [dark, setDark]                   = useState(false);
  const [zoom, setZoom]                   = useState(100);
  const [ghToken, setGhToken]             = useState(null);
  const [ghGist, setGhGist]               = useState(null);
  const [setupDone, setSetupDone]         = useState(false);

  const C = dark ? DARK : LIGHT;
  const scale = zoom / 100;

  // Load credentials and data on mount
  useEffect(() => {
    const token = localStorage.getItem("sn-sb-key");
    const gist  = localStorage.getItem("sn-sb-url");
    if (localStorage.getItem("sn-darkmode") === "true") setDark(true);
    const z = localStorage.getItem("sn-zoom");
    if (z) setZoom(Number(z));

    if (!token || !gist) { setLoading(false); return; }

    setGhToken(token); setGhGist(gist); setSetupDone(true);

    // Handle URL params from extension
    const params = new URLSearchParams(window.location.search);
    const extTicket = params.get("ticket")?.trim().toUpperCase();
    const extStatus = params.get("status");
    window.history.replaceState({}, "", window.location.pathname);

    setSyncing(true);
    loadFromGist(token, gist)
      .then(loaded => {
        let updated = loaded;
        if (extTicket && (extStatus === "Closed" || extStatus === "Chased")) {
          if (!loaded.find(t => t.number === extTicket)) {
            const entry = { id: Date.now(), number: extTicket, status: extStatus, time: new Date().toISOString() };
            updated = [entry, ...loaded];
            return saveToGist(token, gist, updated).then(() => updated);
          }
        }
        return updated;
      })
      .then(data => { setTickets(data); setSyncing(false); setLoading(false); })
      .catch(() => { setSyncError("Could not load data from GitHub. Check your connection."); setSyncing(false); setLoading(false); });
  }, []);

  const toggleDark = () => {
    const next = !dark; setDark(next);
    try { localStorage.setItem("sn-darkmode", String(next)); } catch {}
  };

  const handleZoom = e => {
    const val = Number(e.target.value); setZoom(val);
    try { localStorage.setItem("sn-zoom", String(val)); } catch {}
  };

  const showToast = (msg, color) => {
    setToast({ msg, color: color || C.text });
    setTimeout(() => setToast(null), 2500);
  };

  // Save to Gist and update state
  const save = useCallback(async (updated) => { setTickets(updated); }, []);

  const addTicket = status => {
    const num = input.trim().toUpperCase();
    if (!num) { setPendingStatus(status); return; }
    submitTicket(num, status);
  };

  const submitTicket = (num, status) => {
    if (!num) return;
    const existing = tickets.find(t => t.number === num);
    if (existing) {
      showToast(`⚠️ ${num} already logged as ${existing.status}`, "#92400e");
      setInput(""); setPendingStatus(null); return;
    }
    const entry = { id: Date.now(), number: num, status, time: new Date().toISOString() };
    save([entry, ...tickets]);

    if (cfg) {
      insertTicket(cfg, num, status)
        .then(() => loadToday(cfg).then(rows => setTickets(mapRowsToTickets(rows || []))))
        .catch(() => setSyncError("Sync failed - changes may not be saved."));
    }setInput(""); setPendingStatus(null);
    showToast(`✓ ${num} marked as ${status}`, status === STATUS.CLOSED ? C.closedBadge : C.chasedBadge);
  };

  const handleKey = e => {
    if (e.key === "Enter" && pendingStatus) submitTicket(input.trim().toUpperCase(), pendingStatus);
    else if (e.key === "Enter" && input.trim()) addTicket(pendingStatus || STATUS.CLOSED);
  };

  const removeTicket = id => save(tickets.filter(t => t.id !== id));

  const handleReset = () => {
    save([]); setShowReport(false); setShowResetConfirm(false);
    showToast("Tracker reset — clean slate!", C.red);
  };

  const handleDisconnect = () => {
    localStorage.removeItem("sn-sb-url");
    localStorage.removeItem("sn-sb-key");
    localStorage.removeItem("sn-sb-tracker");
    
    window.location.reload();
  };

  const closed   = tickets.filter(t => t.status === STATUS.CLOSED);
  const chased   = tickets.filter(t => t.status === STATUS.CHASED);
  const filtered = filter === "All" ? tickets : tickets.filter(t => t.status === filter);

  const reportText = () => {
    const date      = new Date().toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"});
    const generated = formatDateTime(new Date().toISOString());
    let txt = `Daily Ticket Report – ${date}\n`;
    txt += `Generated        : ${generated}\n`;
    txt += `${"─".repeat(44)}\n`;
    txt += `Total Processed  : ${tickets.length}\n`;
    txt += `Closed           : ${closed.length}\n`;
    txt += `Chased           : ${chased.length}\n`;
    if (closed.length) { txt += `\nClosed Tickets:\n`; closed.forEach(t => txt += `  • ${t.number.padEnd(16)} ${formatDateTime(t.time)}\n`); }
    if (chased.length) { txt += `\nChased Tickets:\n`; chased.forEach(t => txt += `  • ${t.number.padEnd(16)} ${formatDateTime(t.time)}\n`); }
    return txt;
  };

  const copyReport  = () => { navigator.clipboard.writeText(reportText()); showToast("Report copied to clipboard!"); };
  const exportTxt   = () => {
    const blob = new Blob([reportText()], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `ticket-report-${new Date().toISOString().slice(0,10)}.txt`;
    a.click();
  };

  // Setup screen
  if (!loading && !setupDone) {
    return <SetupScreen dark={dark} onComplete={(cfg, initialTickets) => { setCfg(cfg); setTickets(initialTickets || []); }} />;
  }

  if (loading) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#f4f4f4",color:"#666",fontSize:"16px",fontFamily:"'IBM Plex Sans',sans-serif"}}>
      Loading...
    </div>
  );

  return (
    <div style={{background:C.bg, minHeight:"100vh", fontFamily:"'IBM Plex Sans',sans-serif", transition:"background 0.2s"}}>

      {/* Top bar */}
      <div style={{background:C.red, padding:"12px 32px", display:"flex", alignItems:"center", justifyContent:"space-between", gap:"16px"}}>
        <div style={{display:"flex", alignItems:"center", gap:"12px", flexShrink:0}}>
          <span style={{color:"#fff", fontSize:"18px", fontWeight:"700"}}>Ticket Tracker</span>
          <div style={{width:"1px", height:"20px", background:"rgba(255,255,255,0.3)"}}/>
          <span style={{color:"rgba(255,255,255,0.85)", fontSize:"13px"}}>IT Service Management</span>
        </div>

        <div style={{display:"flex", alignItems:"center", gap:"20px"}}>
          {/* Zoom slider */}
          <div style={{display:"flex", alignItems:"center", gap:"8px"}}>
            <span style={{fontSize:"12px", color:"rgba(255,255,255,0.7)", fontWeight:"500", whiteSpace:"nowrap"}}>A</span>
            <input type="range" min="50" max="200" step="5" value={zoom} onChange={handleZoom}
              style={{width:"80px", background:"rgba(255,255,255,0.25)", accentColor:"#fff"}}/>
            <span style={{fontSize:"15px", color:"rgba(255,255,255,0.7)", fontWeight:"600", whiteSpace:"nowrap"}}>A</span>
            <span style={{fontSize:"11px", color:"rgba(255,255,255,0.5)", minWidth:"32px"}}>{zoom}%</span>
          </div>

          <div style={{width:"1px", height:"20px", background:"rgba(255,255,255,0.25)"}}/>

          {/* Sync status */}
          <span style={{fontSize:"12px", color: syncing ? "rgba(255,255,255,0.6)" : syncError ? "#fca5a5" : "rgba(255,255,255,0.5)", whiteSpace:"nowrap"}}>
            {syncing ? "Syncing..." : syncError ? "Sync error" : "Synced"}
          </span>

          <div style={{width:"1px", height:"20px", background:"rgba(255,255,255,0.25)"}}/>

          {/* Dark mode toggle */}
          <div onClick={toggleDark} style={{display:"flex", alignItems:"center", gap:"8px", cursor:"pointer"}}>
            <span style={{fontSize:"12px", color:"rgba(255,255,255,0.8)", fontWeight:"500"}}>{dark ? "Dark" : "Light"}</span>
            <div style={{width:"44px",height:"24px",borderRadius:"12px",background:dark?"rgba(255,255,255,0.9)":"rgba(0,0,0,0.25)",border:"1px solid rgba(255,255,255,0.4)",position:"relative",transition:"background 0.3s",cursor:"pointer"}}>
              <div style={{width:"18px",height:"18px",borderRadius:"50%",background:dark?"#d61726":"#ffffff",position:"absolute",top:"2px",left:dark?"22px":"2px",transition:"left 0.25s ease, background 0.25s",boxShadow:"0 1px 4px rgba(0,0,0,0.3)"}}/>
            </div>
          </div>

          <div style={{width:"1px", height:"20px", background:"rgba(255,255,255,0.25)"}}/>

          <button onClick={() => setShowResetConfirm(true)}
            style={{background:"rgba(0,0,0,0.2)",color:"#fff",border:"1px solid rgba(255,255,255,0.3)",fontSize:"13px",padding:"7px 16px",borderRadius:"4px",cursor:"pointer",fontWeight:"500",fontFamily:"'IBM Plex Sans',sans-serif",flexShrink:0}}>
            Reset Day
          </button>
        </div>
      </div>

      {/* Toast */}
      {toast && (
        <div style={{position:"fixed",top:"20px",left:"50%",transform:"translateX(-50%)",background:toast.color,color:"#fff",padding:"10px 24px",borderRadius:"4px",fontSize:"14px",fontWeight:"600",zIndex:999,boxShadow:"0 4px 16px rgba(0,0,0,0.25)"}}>
          {toast.msg}
        </div>
      )}

      {/* Reset Modal */}
      {showResetConfirm && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:50}}>
          <div style={{background:C.card,borderRadius:"4px",padding:"32px",maxWidth:"420px",width:"90%",boxShadow:"0 8px 32px rgba(0,0,0,0.3)"}}>
            <h2 style={{color:C.text,fontSize:"20px",fontWeight:"700",marginBottom:"8px"}}>Reset Tracker?</h2>
            <div style={{width:"40px",height:"3px",background:C.red,marginBottom:"16px"}}/>
            <p style={{color:C.textSub,fontSize:"15px",marginBottom:"24px"}}>This will permanently clear all {tickets.length} ticket{tickets.length !== 1 ? "s" : ""} from all browsers. This cannot be undone.</p>
            <div style={{display:"flex",gap:"12px"}}>
              <button onClick={() => setShowResetConfirm(false)}
                style={{flex:1,background:C.border,color:C.text,border:"none",borderRadius:"4px",padding:"12px",fontSize:"15px",cursor:"pointer",fontWeight:"500",fontFamily:"'IBM Plex Sans',sans-serif"}}>Cancel</button>
              <button onClick={handleReset}
                style={{flex:1,background:C.red,color:"#fff",border:"none",borderRadius:"4px",padding:"12px",fontSize:"15px",fontWeight:"700",cursor:"pointer",fontFamily:"'IBM Plex Sans',sans-serif"}}>Yes, Reset</button>
            </div>
          </div>
        </div>
      )}

      {/* Scalable content */}
      <div style={{transformOrigin:"top center", transform:`scale(${scale})`, transition:"transform 0.2s"}}>
        <div style={{maxWidth:"720px", margin:"0 auto", padding:"32px 20px"}}>

          <div style={{marginBottom:"28px", display:"flex", justifyContent:"space-between", alignItems:"center"}}>
            <p style={{color:C.textSub, fontSize:"14px"}}>
              {new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}
            </p>
            <button onClick={handleDisconnect}
              style={{background:"none",border:`1px solid ${C.border}`,borderRadius:"4px",padding:"5px 12px",fontSize:"12px",color:C.textSub,cursor:"pointer",fontFamily:"'IBM Plex Sans',sans-serif"}}>
              Disconnect Supabase
            </button>
          </div>

          {/* Sync error banner */}
          {syncError && (
            <div style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:"4px",padding:"12px 16px",marginBottom:"16px",fontSize:"13px",color:"#991b1b"}}>
              {syncError}
            </div>
          )}

          {/* Stats */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"16px",marginBottom:"20px"}}>
            {[
              {label:"Total Processed", count:tickets.length, accent:C.text},
              {label:"Closed",          count:closed.length,  accent:C.closedBadge},
              {label:"Chased",          count:chased.length,  accent:C.chasedBadge},
            ].map(s => (
              <div key={s.label} style={{background:C.card,border:`1px solid ${C.border}`,borderTop:`3px solid ${s.accent}`,borderRadius:"4px",padding:"20px",textAlign:"center",transition:"background 0.2s"}}>
                <div style={{fontSize:"40px",fontWeight:"700",color:s.accent,lineHeight:1}}>{s.count}</div>
                <div style={{fontSize:"12px",color:C.textSub,marginTop:"6px",fontWeight:"500"}}>{s.label}</div>
              </div>
            ))}
          </div>

          {/* Input */}
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:"4px",padding:"24px",marginBottom:"16px",transition:"background 0.2s"}}>
            <label style={{display:"block",fontSize:"13px",color:C.textSub,marginBottom:"8px",fontWeight:"600",textTransform:"uppercase",letterSpacing:"0.5px"}}>Ticket Number</label>
            <input
              style={{width:"100%",border:`1px solid ${C.border}`,borderRadius:"4px",padding:"12px 14px",fontSize:"15px",fontFamily:"'IBM Plex Sans',monospace",color:C.text,outline:"none",marginBottom:"14px",background:C.bg,transition:"background 0.2s, color 0.2s"}}
              placeholder="e.g. INC0012345"
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={handleKey}
              onFocus={e => e.target.style.borderColor = C.red}
              onBlur={e => e.target.style.borderColor = C.border}
            />
            {pendingStatus && !input.trim() && (
              <p style={{fontSize:"13px",color:"#b45309",marginBottom:"12px",fontWeight:"500"}}>⚠️ Enter a ticket number above, then click the button again</p>
            )}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}}>
              <button onClick={() => addTicket(STATUS.CLOSED)} disabled={syncing}
                style={{background:C.closedBadge,color:"#fff",border:"none",borderRadius:"4px",padding:"13px",fontSize:"15px",fontWeight:"600",cursor:syncing?"not-allowed":"pointer",fontFamily:"'IBM Plex Sans',sans-serif",opacity:syncing?0.7:1}}>
                Mark as Closed
              </button>
              <button onClick={() => addTicket(STATUS.CHASED)} disabled={syncing}
                style={{background:C.chasedBadge,color:"#fff",border:"none",borderRadius:"4px",padding:"13px",fontSize:"15px",fontWeight:"600",cursor:syncing?"not-allowed":"pointer",fontFamily:"'IBM Plex Sans',sans-serif",opacity:syncing?0.7:1}}>
                Mark as Chased
              </button>
            </div>
          </div>

          {/* Ticket List */}
          {tickets.length > 0 && (
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:"4px",padding:"24px",marginBottom:"16px",transition:"background 0.2s"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"16px"}}>
                <div style={{display:"flex",gap:"8px"}}>
                  {["All","Closed","Chased"].map(f => (
                    <button key={f} onClick={() => setFilter(f)}
                      style={{background:filter===f?C.filterActive:C.filterInactive,color:filter===f?C.filterActiveTxt:C.filterInactiveTxt,border:`1px solid ${filter===f?C.filterActive:C.border}`,borderRadius:"4px",padding:"6px 16px",fontSize:"13px",fontWeight:"600",cursor:"pointer",fontFamily:"'IBM Plex Sans',sans-serif"}}>
                      {f}
                    </button>
                  ))}
                </div>
                <span style={{fontSize:"13px",color:C.textSub}}>{filtered.length} ticket{filtered.length !== 1 ? "s" : ""}</span>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:"8px",maxHeight:"320px",overflowY:"auto"}}>
                {filtered.map(t => {
                  const isC = t.status === STATUS.CLOSED;
                  return (
                    <div key={t.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:isC?C.closedBg:C.chasedBg,border:`1px solid ${isC?C.closedBorder:C.chasedBorder}`,borderRadius:"4px",padding:"12px 14px"}}>
                      <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
                        <span style={{background:isC?C.closedBadge:C.chasedBadge,color:"#fff",fontSize:"11px",fontWeight:"700",padding:"3px 10px",borderRadius:"3px",textTransform:"uppercase",letterSpacing:"0.5px"}}>{t.status}</span>
                        <span style={{fontFamily:"monospace",fontWeight:"700",fontSize:"15px",color:isC?C.closedText:C.chasedText}}>{t.number}</span>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
                        <span style={{fontSize:"12px",color:C.textSub}}>{formatDateTime(t.time)}</span>
                        <button onClick={() => removeTicket(t.id)}
                          style={{background:"none",border:"none",color:C.border,cursor:"pointer",fontSize:"16px",padding:"0 2px",lineHeight:1}}
                          onMouseEnter={e => e.target.style.color = C.red}
                          onMouseLeave={e => e.target.style.color = C.border}>✕</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Report */}
          {tickets.length > 0 && (
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:"4px",padding:"24px",transition:"background 0.2s"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"16px"}}>
                <div>
                  <h2 style={{color:C.text,fontSize:"15px",fontWeight:"700"}}>End of Day Report</h2>
                  <div style={{width:"32px",height:"2px",background:C.red,marginTop:"4px"}}/>
                </div>
                <div style={{display:"flex",gap:"8px"}}>
                  <button onClick={() => setShowReport(!showReport)}
                    style={{background:C.bg,color:C.textSub,border:`1px solid ${C.border}`,borderRadius:"4px",padding:"7px 14px",fontSize:"13px",cursor:"pointer",fontWeight:"500",fontFamily:"'IBM Plex Sans',sans-serif"}}>
                    {showReport ? "Hide" : "Preview"}
                  </button>
                  <button onClick={copyReport}
                    style={{background:C.bg,color:C.text,border:`1px solid ${C.border}`,borderRadius:"4px",padding:"7px 14px",fontSize:"13px",cursor:"pointer",fontWeight:"500",fontFamily:"'IBM Plex Sans',sans-serif"}}>
                    Copy
                  </button>
                  <button onClick={exportTxt}
                    style={{background:C.red,color:"#fff",border:"none",borderRadius:"4px",padding:"7px 16px",fontSize:"13px",cursor:"pointer",fontWeight:"600",fontFamily:"'IBM Plex Sans',sans-serif"}}>
                    Export .txt
                  </button>
                </div>
              </div>
              {showReport && (
                <pre style={{background:C.reportBg,border:`1px solid ${C.border}`,borderRadius:"4px",padding:"16px",fontSize:"13px",color:C.reportText,fontFamily:"monospace",whiteSpace:"pre-wrap"}}>
                  {reportText()}
                </pre>
              )}
            </div>
          )}

          {tickets.length === 0 && (
            <div style={{textAlign:"center",color:C.textSub,fontSize:"15px",padding:"60px 0",background:C.card,border:`1px solid ${C.border}`,borderRadius:"4px"}}>
              No tickets logged yet — add your first one above.
            </div>
          )}

          <div style={{textAlign:"center",marginTop:"24px",paddingTop:"16px",borderTop:`1px solid ${C.border}`}}>
            <span style={{fontSize:"12px",color:C.footerText}}>IT Service Management — Ticket Tracker</span>
          </div>

        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
