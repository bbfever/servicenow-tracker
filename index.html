<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🎫 Ticket Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#000;font-family:sans-serif}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const STATUS = { CLOSED: "Closed", CHASED: "Chased" };

function formatDateTime(iso) {
  return new Date(iso).toLocaleString("en-GB", {
    day:"2-digit", month:"short", year:"numeric",
    hour:"2-digit", minute:"2-digit", second:"2-digit"
  });
}

function App() {
  const [tickets, setTickets] = useState([]);
  const [input, setInput] = useState("");
  const [pendingStatus, setPendingStatus] = useState(null);
  const [filter, setFilter] = useState("All");
  const [showReport, setShowReport] = useState(false);
  const [loading, setLoading] = useState(true);
  const [toast, setToast] = useState(null);
  const [showResetConfirm, setShowResetConfirm] = useState(false);
  const [showExportModal, setShowExportModal] = useState(false);

  useEffect(() => {
    try {
      const saved = localStorage.getItem("sn-tickets");
      if (saved) setTickets(JSON.parse(saved));
    } catch {}
    setLoading(false);
  }, []);

  const save = (updated) => {
    setTickets(updated);
    try { localStorage.setItem("sn-tickets", JSON.stringify(updated)); } catch {}
  };

  const showToast = (msg, color = "bg-zinc-700") => {
    setToast({ msg, color });
    setTimeout(() => setToast(null), 2500);
  };

  const addTicket = (status) => {
    const num = input.trim().toUpperCase();
    if (!num) { setPendingStatus(status); return; }
    submitTicket(num, status);
  };

  const submitTicket = (num, status) => {
    if (!num) return;
    const existing = tickets.find(t => t.number === num);
    if (existing) {
      showToast(`⚠️ ${num} already logged as ${existing.status}`, "#92400e");
      setInput(""); setPendingStatus(null); return;
    }
    const entry = { id: Date.now(), number: num, status, time: new Date().toISOString() };
    save([entry, ...tickets]);
    setInput(""); setPendingStatus(null);
    showToast(`${num} marked as ${status}`, status === STATUS.CLOSED ? "#166534" : "#1e3a5f");
  };

  const handleKey = (e) => {
    if (e.key === "Enter" && pendingStatus) submitTicket(input.trim().toUpperCase(), pendingStatus);
    else if (e.key === "Enter" && input.trim()) addTicket(pendingStatus || STATUS.CLOSED);
  };

  const removeTicket = (id) => save(tickets.filter(t => t.id !== id));

  const handleReset = () => {
    save([]); setShowReport(false); setShowResetConfirm(false);
    showToast("Tracker reset — clean slate!", "#7f1d1d");
  };

  const closed = tickets.filter(t => t.status === STATUS.CLOSED);
  const chased = tickets.filter(t => t.status === STATUS.CHASED);
  const filtered = filter === "All" ? tickets : tickets.filter(t => t.status === filter);

  const reportText = () => {
    const date = new Date().toLocaleDateString("en-GB", { day:"numeric", month:"long", year:"numeric" });
    const generated = formatDateTime(new Date().toISOString());
    let txt = `Daily Ticket Report – ${date}\n`;
    txt += `Generated        : ${generated}\n`;
    txt += `${"─".repeat(44)}\n`;
    txt += `Total Processed  : ${tickets.length}\n`;
    txt += `Closed           : ${closed.length}\n`;
    txt += `Chased           : ${chased.length}\n`;
    if (closed.length) { txt += `\nClosed Tickets:\n`; closed.forEach(t => txt += `  • ${t.number.padEnd(16)} ${formatDateTime(t.time)}\n`); }
    if (chased.length) { txt += `\nChased Tickets:\n`; chased.forEach(t => txt += `  • ${t.number.padEnd(16)} ${formatDateTime(t.time)}\n`); }
    return txt;
  };

  const copyReport = () => { navigator.clipboard.writeText(reportText()); showToast("Report copied to clipboard!"); };

  const exportTxt = () => {
    const blob = new Blob([reportText()], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `ticket-report-${new Date().toISOString().slice(0,10)}.txt`;
    a.click();
  };

  if (loading) return <div style={{background:"#000",display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",color:"#555",fontSize:"18px"}}>Loading...</div>;

  return (
    <div style={{background:"#000", minHeight:"100vh"}}>
      <div style={{background:"#000", maxWidth:"720px", margin:"0 auto", padding:"28px 20px"}}>

        {/* Toast */}
        {toast && (
          <div style={{position:"fixed",top:"20px",left:"50%",transform:"translateX(-50%)",background:toast.color,color:"#fff",padding:"10px 22px",borderRadius:"999px",fontSize:"14px",fontWeight:"600",zIndex:999,boxShadow:"0 4px 20px rgba(0,0,0,0.5)"}}>
            {toast.msg}
          </div>
        )}

        {/* Export Modal */}
        {showExportModal && (
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:50}}>
            <div style={{background:"#111",border:"1px solid #333",borderRadius:"16px",padding:"28px",width:"90%",maxWidth:"580px"}}>
              <h2 style={{color:"#fff",fontSize:"18px",fontWeight:"700",marginBottom:"6px"}}>📋 Export Report</h2>
              <p style={{color:"#666",fontSize:"13px",marginBottom:"14px"}}>Click below to download the report as a .txt file.</p>
              <div style={{display:"flex",gap:"10px",marginTop:"12px"}}>
                <button onClick={() => { exportTxt(); setShowExportModal(false); }}
                  style={{flex:1,background:"#3730a3",color:"#fff",border:"none",borderRadius:"10px",padding:"12px",fontSize:"14px",fontWeight:"700",cursor:"pointer"}}>
                  💾 Download .txt
                </button>
                <button onClick={() => setShowExportModal(false)}
                  style={{background:"#222",color:"#888",border:"none",borderRadius:"10px",padding:"12px 20px",fontSize:"14px",cursor:"pointer"}}>
                  Close
                </button>
              </div>
            </div>
          </div>
        )}

        {/* Reset Modal */}
        {showResetConfirm && (
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:50}}>
            <div style={{background:"#111",border:"1px solid #333",borderRadius:"16px",padding:"32px",maxWidth:"420px",width:"90%"}}>
              <h2 style={{color:"#fff",fontSize:"20px",fontWeight:"700",marginBottom:"12px"}}>Reset Tracker?</h2>
              <p style={{color:"#888",fontSize:"15px",marginBottom:"24px"}}>This will permanently clear all {tickets.length} ticket{tickets.length !== 1 ? "s" : ""}. This cannot be undone.</p>
              <div style={{display:"flex",gap:"12px"}}>
                <button onClick={() => setShowResetConfirm(false)}
                  style={{flex:1,background:"#222",color:"#aaa",border:"none",borderRadius:"12px",padding:"12px",fontSize:"15px",cursor:"pointer"}}>
                  Cancel
                </button>
                <button onClick={handleReset}
                  style={{flex:1,background:"#7f1d1d",color:"#fff",border:"none",borderRadius:"12px",padding:"12px",fontSize:"15px",fontWeight:"700",cursor:"pointer"}}>
                  Yes, Reset
                </button>
              </div>
            </div>
          </div>
        )}

        {/* Header */}
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:"28px"}}>
          <div>
            <h1 style={{color:"#fff",fontSize:"28px",fontWeight:"800"}}>🎫 Ticket Tracker</h1>
            <p style={{color:"#555",fontSize:"14px",marginTop:"4px"}}>
              {new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}
            </p>
          </div>
          <button onClick={() => setShowResetConfirm(true)}
            style={{background:"#1c0a0a",color:"#f87171",border:"1px solid #450a0a",fontSize:"14px",padding:"10px 18px",borderRadius:"10px",cursor:"pointer",fontWeight:"600"}}>
            🔄 Reset Day
          </button>
        </div>

        {/* Stats */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"16px",marginBottom:"20px"}}>
          {[{label:"Total",count:tickets.length,color:"#fff"},{label:"Closed",count:closed.length,color:"#4ade80"},{label:"Chased",count:chased.length,color:"#60a5fa"}].map(s => (
            <div key={s.label} style={{background:"#111",border:"1px solid #222",borderRadius:"14px",padding:"20px",textAlign:"center"}}>
              <div style={{fontSize:"42px",fontWeight:"800",color:s.color,lineHeight:1}}>{s.count}</div>
              <div style={{fontSize:"13px",color:"#555",marginTop:"6px"}}>{s.label}</div>
            </div>
          ))}
        </div>

        {/* Input */}
        <div style={{background:"#111",border:"1px solid #222",borderRadius:"14px",padding:"20px",marginBottom:"16px"}}>
          <label style={{display:"block",fontSize:"14px",color:"#888",marginBottom:"10px",fontWeight:"500"}}>Ticket Number</label>
          <input
            style={{width:"100%",background:"#1a1a1a",border:"1px solid #333",borderRadius:"10px",padding:"12px 14px",fontSize:"16px",fontFamily:"monospace",color:"#fff",outline:"none",marginBottom:"12px"}}
            placeholder="e.g. INC0012345"
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={handleKey}
          />
          {pendingStatus && !input.trim() && (
            <p style={{fontSize:"13px",color:"#f59e0b",marginBottom:"10px"}}>⚠️ Enter a ticket number above, then click the button again (or press Enter)</p>
          )}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"14px"}}>
            <button onClick={() => addTicket(STATUS.CLOSED)}
              style={{background:"#166534",color:"#fff",border:"none",borderRadius:"10px",padding:"14px",fontSize:"16px",fontWeight:"700",cursor:"pointer"}}>
              ✅ Mark as Closed
            </button>
            <button onClick={() => addTicket(STATUS.CHASED)}
              style={{background:"#1e3a5f",color:"#fff",border:"none",borderRadius:"10px",padding:"14px",fontSize:"16px",fontWeight:"700",cursor:"pointer"}}>
              📧 Mark as Chased
            </button>
          </div>
        </div>

        {/* Ticket List */}
        {tickets.length > 0 && (
          <div style={{background:"#111",border:"1px solid #222",borderRadius:"14px",padding:"20px",marginBottom:"16px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"14px"}}>
              <div style={{display:"flex",gap:"8px"}}>
                {["All","Closed","Chased"].map(f => (
                  <button key={f} onClick={() => setFilter(f)}
                    style={{background:filter===f?"#e5e7eb":"#1f1f1f",color:filter===f?"#111":"#888",border:"none",borderRadius:"999px",padding:"6px 16px",fontSize:"13px",fontWeight:"600",cursor:"pointer"}}>
                    {f}
                  </button>
                ))}
              </div>
              <span style={{fontSize:"13px",color:"#444"}}>{filtered.length} ticket{filtered.length!==1?"s":""}</span>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:"8px",maxHeight:"320px",overflowY:"auto"}}>
              {filtered.map(t => {
                const isC = t.status === STATUS.CLOSED;
                return (
                  <div key={t.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:isC?"rgba(20,83,45,0.35)":"rgba(30,58,95,0.35)",border:`1px solid ${isC?"#14532d55":"#1e3a5f55"}`,borderRadius:"10px",padding:"12px 14px"}}>
                    <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
                      <span style={{background:isC?"#16a34a":"#2563eb",color:"#fff",fontSize:"12px",fontWeight:"700",padding:"3px 10px",borderRadius:"999px"}}>{t.status}</span>
                      <span style={{fontFamily:"monospace",fontWeight:"700",fontSize:"15px",color:isC?"#4ade80":"#60a5fa"}}>{t.number}</span>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
                      <span style={{fontSize:"12px",color:"#555"}}>{formatDateTime(t.time)}</span>
                      <button onClick={() => removeTicket(t.id)}
                        style={{background:"none",border:"none",color:"#444",cursor:"pointer",fontSize:"15px",padding:"0 4px"}}
                        onMouseEnter={e => e.target.style.color="#f87171"}
                        onMouseLeave={e => e.target.style.color="#444"}>✕</button>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Report */}
        {tickets.length > 0 && (
          <div style={{background:"#111",border:"1px solid #222",borderRadius:"14px",padding:"20px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"14px"}}>
              <h2 style={{color:"#ccc",fontSize:"15px",fontWeight:"600"}}>End of Day Report</h2>
              <div style={{display:"flex",gap:"8px"}}>
                <button onClick={() => setShowReport(!showReport)}
                  style={{background:"#1f1f1f",color:"#888",border:"none",borderRadius:"999px",padding:"7px 16px",fontSize:"13px",cursor:"pointer",fontWeight:"500"}}>
                  {showReport?"Hide":"Preview"}
                </button>
                <button onClick={copyReport}
                  style={{background:"#2a2a2a",color:"#ccc",border:"none",borderRadius:"999px",padding:"7px 16px",fontSize:"13px",cursor:"pointer",fontWeight:"500"}}>
                  📋 Copy
                </button>
                <button onClick={exportTxt}
                  style={{background:"#3730a3",color:"#fff",border:"none",borderRadius:"999px",padding:"7px 16px",fontSize:"13px",cursor:"pointer",fontWeight:"600"}}>
                  💾 Export .txt
                </button>
              </div>
            </div>
            {showReport && (
              <pre style={{background:"#000",border:"1px solid #1f1f1f",borderRadius:"10px",padding:"16px",fontSize:"13px",color:"#4ade80",fontFamily:"monospace",whiteSpace:"pre-wrap"}}>
                {reportText()}
              </pre>
            )}
          </div>
        )}

        {tickets.length === 0 && (
          <div style={{textAlign:"center",color:"#333",fontSize:"15px",padding:"60px 0"}}>
            No tickets logged yet — add your first one above!
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
