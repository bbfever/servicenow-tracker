<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ticket Tracker - Supabase Sync</title>
  <link rel="preconnect" href="https://unpkg.com">
  <style>
    :root{
      --bg:#0b0f14; --card:#101826; --border:#243244; --text:#e5e7eb; --sub:#9ca3af;
      --red:#dc2626; --blue:#2563eb; --green:#16a34a; --amber:#f59e0b;
      --input:#0b1220;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif}
    .topbar{position:sticky;top:0;z-index:10;background:rgba(11,15,20,.92);backdrop-filter:blur(8px);
      border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px}
    .brand{font-weight:800;letter-spacing:.3px}
    .tag{color:var(--sub);font-size:12px}
    .spacer{flex:1}
    .btn{border:1px solid var(--border);background:transparent;color:var(--text);padding:8px 10px;border-radius:8px;
      cursor:pointer;font-weight:700;font-size:13px}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .btn.red{background:var(--red);border-color:var(--red)}
    .btn.blue{background:var(--blue);border-color:var(--blue)}
    .btn.green{background:var(--green);border-color:var(--green)}
    .btn.ghost{background:transparent}
    .wrap{max-width:980px;margin:0 auto;padding:18px 16px 36px}
    .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px}
    .stat{display:flex;flex-direction:column;gap:6px;align-items:center;justify-content:center;min-height:92px}
    .stat .num{font-size:36px;font-weight:900}
    .stat .label{color:var(--sub);font-size:12px;text-transform:uppercase;letter-spacing:.9px}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .input{width:100%;background:var(--input);border:1px solid var(--border);border-radius:10px;padding:12px 12px;
      color:var(--text);font-size:14px;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;outline:none}
    .input:focus{border-color:#3b82f6}
    .muted{color:var(--sub)}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);padding:6px 10px;border-radius:999px;font-size:12px;color:var(--sub)}
    .ticketList{margin-top:10px}
    .ticket{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border:1px solid var(--border);
      border-radius:12px;background:rgba(255,255,255,.02);margin-bottom:8px}
    .ticket .left{display:flex;align-items:center;gap:10px}
    .badge{font-size:12px;font-weight:900;padding:4px 8px;border-radius:999px;border:1px solid var(--border)}
    .badge.closed{background:rgba(220,38,38,.15);border-color:rgba(220,38,38,.45);color:#fecaca}
    .badge.chased{background:rgba(37,99,235,.15);border-color:rgba(37,99,235,.45);color:#bfdbfe}
    .code{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-weight:800}
    .small{font-size:12px;color:var(--sub)}
    .tabs{display:flex;gap:8px;margin-top:10px}
    .tab{padding:7px 10px;border-radius:10px;border:1px solid var(--border);cursor:pointer;font-size:13px}
    .tab.active{background:rgba(255,255,255,.06)}
    .err{color:#fca5a5;font-weight:800}
    .ok{color:#86efac;font-weight:800}
    .setupWrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:22px}
    .setup{max-width:620px;width:100%}
    .setup h1{margin:0 0 6px 0}
    .setup p{margin:0 0 14px 0;color:var(--sub);line-height:1.5}
    .label{display:block;font-size:12px;color:var(--sub);font-weight:800;text-transform:uppercase;letter-spacing:.8px;margin:10px 0 6px}
    .hint{font-size:12px;color:var(--sub);line-height:1.5;margin-top:6px}
  </style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

<script type="text/babel">
const { useEffect, useMemo, useRef, useState, useCallback } = React;

const DEFAULT_SB_URL = "https://gehrxompqjktnhubfwbu.supabase.co";
const DEFAULT_SB_KEY = "sb_publishable_8Tw2qXfWLhld8zmx4lphRA_GIH_7ZfN";

// Capture extension parameters (ticket/status) if present
storePendingFromUrl();

// localStorage keys
const LS_URL = "sn-sb-url";
const LS_KEY = "sn-sb-key";
const LS_TK  = "sn-sb-tracker";

function getUrlParams(){
  const u = new URL(window.location.href);
  return {
    ticket: (u.searchParams.get("ticket") || "").trim().toUpperCase(),
    status: (u.searchParams.get("status") || "").trim()
  };
}

function normalizeStatus(s){
  const v = String(s||"").toLowerCase();
  if (v === "closed" || v === "close") return "Closed";
  if (v === "chased" || v === "chase") return "Chased";
  return "";
}

// If extension opens the tracker with ?ticket=INC...&status=Closed, store it until we are connected.
function storePendingFromUrl(){
  const p = getUrlParams();
  const status = normalizeStatus(p.status);
  if (!p.ticket || !status) return;
  sessionStorage.setItem("sn-pending-ticket", JSON.stringify({ ticket: p.ticket, status, at: Date.now() }));
}

function consumePending(){
  try{
    const raw = sessionStorage.getItem("sn-pending-ticket");
    if (!raw) return null;
    const obj = JSON.parse(raw);
    sessionStorage.removeItem("sn-pending-ticket");
    return obj;
  }catch{
    sessionStorage.removeItem("sn-pending-ticket");
    return null;
  }
}

function utcDateISO() { return new Date().toISOString().slice(0,10); }
function nowISO() { return new Date().toISOString(); }
function prettyTime(iso){
  try{
    const d = new Date(iso);
    return d.toLocaleString(undefined, { year:"numeric", month:"short", day:"2-digit", hour:"2-digit", minute:"2-digit", second:"2-digit" });
  }catch{ return iso; }
}

async function sbFetch(method, urlBase, publishableKey, trackerKey, path, body){
  const base = (urlBase||"").replace(/\/$/, "");
  const url = base + path;

  const headers = {
    "Content-Type":"application/json",
    "apikey": publishableKey,
    "Authorization": "Bearer " + publishableKey,
    "x-tracker-key": trackerKey || ""
  };

  const res = await fetch(url, {
    method,
    headers,
    body: body ? JSON.stringify(body) : undefined
  });

  if (!res.ok){
    let detail = "";
    try{
      const ct = res.headers.get("content-type") || "";
      if (ct.includes("application/json")){
        const j = await res.json();
        detail = j?.message || j?.error || JSON.stringify(j);
      } else {
        detail = await res.text();
      }
    }catch{}
    throw new Error(`Supabase API error: ${res.status}${detail ? " - " + detail : ""}`);
  }

  if (res.status === 204) return null;
  const ct = res.headers.get("content-type") || "";
  if (ct.includes("application/json")) return await res.json();
  return await res.text();
}

async function loadToday(cfg){
  const d = utcDateISO();
  // PostgREST filter: work_date=eq.YYYY-MM-DD
  return sbFetch("GET", cfg.url, cfg.key, cfg.trackerKey, `/rest/v1/tickets?work_date=eq.${d}&order=created_at.desc`);
}

async function insertTicket(cfg, ticketNumber, status){
  const payload = {
    ticket_number: ticketNumber,
    status,
    tracker_key: cfg.trackerKey,
    work_date: utcDateISO()
  };
  // Prefer representation so we can see the inserted row
  return sbFetch("POST", cfg.url, cfg.key, cfg.trackerKey, `/rest/v1/tickets`, payload);
}

async function deleteToday(cfg){
  const d = utcDateISO();
  return sbFetch("DELETE", cfg.url, cfg.key, cfg.trackerKey, `/rest/v1/tickets?work_date=eq.${d}`);
}

function SetupScreen({ onConnected }){
  const [url, setUrl] = useState(localStorage.getItem(LS_URL) || DEFAULT_SB_URL);
  const [key, setKey] = useState(localStorage.getItem(LS_KEY) || DEFAULT_SB_KEY);
  const [trackerKey, setTrackerKey] = useState(localStorage.getItem(LS_TK) || "default");
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");
  const [pendingPreview] = useState(() => {
    try { return JSON.parse(sessionStorage.getItem("sn-pending-ticket") || "null"); } catch { return null; }
  });

  const connect = async () => {
    setErr("");
    const cfg = { url: url.trim(), key: key.trim(), trackerKey: trackerKey.trim() };
    if (!cfg.url) return setErr("Project URL is required.");
    if (!cfg.key) return setErr("Publishable key is required.");
    if (!cfg.trackerKey) return setErr("Tracker key is required.");

    setLoading(true);
    try{
      // Validate: can read today's tickets (empty OK)
      await loadToday(cfg);

      localStorage.setItem(LS_URL, cfg.url);
      localStorage.setItem(LS_KEY, cfg.key);
      localStorage.setItem(LS_TK, cfg.trackerKey);

      onConnected(cfg);
    }catch(e){
      setErr(String(e?.message || e));
    }finally{
      setLoading(false);
    }
  };

  return (
    <div className="setupWrap">
      <div className="card setup">
        <h1>Connect Ticket Tracker</h1>
        <p>This version uses Supabase for cross-browser sync. Enter the values from Supabase and a tracker key (shared passphrase). Use the same tracker key in every browser.</p>

        <div className="hint">
          Supabase dashboard - Settings - Data API (Project URL) and Settings - API Keys (Publishable key).
          <br/>Do not use secret keys in the website.
        </div>
        {pendingPreview && pendingPreview.ticket && pendingPreview.status && (
          <div style={{marginTop:12}} className="pill">
            Pending from extension: <span className="code">{pendingPreview.ticket}</span> ({pendingPreview.status})
          </div>
        )}

        <label className="label">Supabase Project URL</label>
        <input className="input" value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://xxxx.supabase.co" />

        <label className="label">Supabase Publishable key</label>
        <input className="input" type="password" value={key} onChange={e=>setKey(e.target.value)} placeholder="sb_publishable_..." />

        <label className="label">Tracker key (shared passphrase)</label>
        <input className="input" type="password" value={trackerKey} onChange={e=>setTrackerKey(e.target.value)} placeholder="default (or any passphrase you chose)" onKeyDown={e=> e.key==="Enter" && connect()} />
        <div className="hint">This must match your Supabase RLS policy: it compares header <span className="code">x-tracker-key</span> with column <span className="code">tracker_key</span>.</div>

        {err && <div style={{marginTop:12}} className="err">{err}</div>}

        <div style={{marginTop:14}} className="row">
          <button className="btn red" onClick={connect} disabled={loading}>{loading ? "Connecting..." : "Connect"}</button>
          <button className="btn ghost" onClick={()=>{
            localStorage.removeItem(LS_URL); localStorage.removeItem(LS_KEY); localStorage.removeItem(LS_TK);
            setUrl(DEFAULT_SB_URL); setKey(DEFAULT_SB_KEY); setTrackerKey("default");
          }} disabled={loading}>Reset fields</button>
        </div>
      </div>
    </div>
  );
}

function App(){
  // If the extension opened this page with params, we stored them in sessionStorage already.
  // Nothing else needed here.

  const [cfg, setCfg] = useState(()=>{
    const url = localStorage.getItem(LS_URL);
    const key = localStorage.getItem(LS_KEY);
    const trackerKey = localStorage.getItem(LS_TK);
    if (url && key && trackerKey) return { url, key, trackerKey };
    return null;
  });

  const [tickets, setTickets] = useState([]);
  const [filter, setFilter] = useState("All");
  const [input, setInput] = useState("");
  const [syncState, setSyncState] = useState({ syncing:false, last:"", error:"" });

  const counts = useMemo(()=>{
    const closed = tickets.filter(t=> (t.status||"").toLowerCase()==="closed").length;
    const chased = tickets.filter(t=> (t.status||"").toLowerCase()==="chased").length;
    return { total: tickets.length, closed, chased };
  }, [tickets]);

  const shown = useMemo(()=>{
    if (filter==="Closed") return tickets.filter(t=> (t.status||"").toLowerCase()==="closed");
    if (filter==="Chased") return tickets.filter(t=> (t.status||"").toLowerCase()==="chased");
    return tickets;
  }, [tickets, filter]);

  const refresh = useCallback(async ()=>{
    if (!cfg) return;
    setSyncState(s=>({ ...s, syncing:true, error:"" }));
    try{
      const remote = await loadToday(cfg);
      // Map supabase rows -> UI objects
      const mapped = (remote || []).map(r=>({
        id: r.id,
        number: String(r.ticket_number||"").toUpperCase(),
        status: r.status,
        time: r.created_at || nowISO()
      }));
      setTickets(mapped);
      setSyncState(s=>({ ...s, syncing:false, last: nowISO(), error:"" }));
    }catch(e){
      setSyncState(s=>({ ...s, syncing:false, error: String(e?.message || e) }));
    }
  }, [cfg]);

  useEffect(()=>{ 
    if(cfg) {
      refresh().then(async ()=>{
        const pending = consumePending();
        if (pending && pending.ticket && pending.status) {
          try{
            await insertTicket(cfg, pending.ticket, pending.status);
          }catch(e){
            // If insert fails, keep going
          }
          await refresh();
        }
      });
    }
  }, [cfg, refresh]);

  useEffect(()=>{
    if(!cfg) return;
    const id = setInterval(()=>refresh(), 30000);
    return ()=>clearInterval(id);
  }, [cfg, refresh]);

  const add = async (status) => {
    const num = input.trim().toUpperCase();
    if (!num) return;

    // Prevent duplicates in UI (still allowed in DB; this is just convenience)
    if (tickets.some(t => t.number === num)){
      setSyncState(s=>({ ...s, error: `${num} already logged.` }));
      setInput("");
      return;
    }

    // optimistic UI
    const optimistic = [{ id: "local-"+Date.now(), number: num, status, time: nowISO() }, ...tickets];
    setTickets(optimistic);
    setInput("");

    setSyncState(s=>({ ...s, syncing:true, error:"" }));
    try{
      await insertTicket(cfg, num, status);
      await refresh();
    }catch(e){
      setSyncState(s=>({ ...s, syncing:false, error: String(e?.message || e) }));
    }
  };

  const resetDay = async () => {
    if (!confirm("Reset today? This clears the list. If your Supabase DELETE policy exists, it will also delete today's rows.")) return;
    setTickets([]);
    if (!cfg) return;

    setSyncState(s=>({ ...s, syncing:true, error:"" }));
    try{
      await deleteToday(cfg);
    }catch(e){
      // If DELETE policy not configured, show warning but keep running
      setSyncState(s=>({ ...s, error: "Could not delete rows (DELETE policy likely missing). Local list cleared." }));
    }finally{
      await refresh();
    }
  };

  const disconnect = () => {
    localStorage.removeItem(LS_URL);
    localStorage.removeItem(LS_KEY);
    localStorage.removeItem(LS_TK);
    setCfg(null);
    setTickets([]);
    setSyncState({ syncing:false, last:"", error:"" });
  };

  const endOfDayReport = useMemo(()=>{
    const d = new Date();
    const dateLine = d.toLocaleDateString(undefined, { weekday:"long", year:"numeric", month:"long", day:"numeric" });
    const lines = [
      `End of Day Report - ${dateLine}`,
      `Total processed: ${counts.total}`,
      `Closed: ${counts.closed}`,
      `Chased: ${counts.chased}`,
      "",
      "Tickets:"
    ];
    for (const t of tickets.slice().reverse()){
      lines.push(`- ${t.number} - ${t.status} - ${prettyTime(t.time)}`);
    }
    return lines.join("\n");
  }, [tickets, counts]);

  const copyReport = async () => {
    try{
      await navigator.clipboard.writeText(endOfDayReport);
      setSyncState(s=>({ ...s, error:"", last: s.last }));
    }catch(e){
      setSyncState(s=>({ ...s, error:"Copy failed (clipboard permission)." }));
    }
  };

  const exportTxt = () => {
    const blob = new Blob([endOfDayReport], { type:"text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `ticket-report-${utcDateISO()}.txt`;
    a.click();
    URL.revokeObjectURL(url);
  };

  if (!cfg){
    return <SetupScreen onConnected={setCfg} />;
  }

  return (
    <>
      <div className="topbar">
        <div>
          <div className="brand">Ticket Tracker</div>
          <div className="tag">Supabase sync</div>
        </div>
        <span className="pill">Date: <span className="code">{utcDateISO()}</span></span>
        <span className="pill">Tracker key: <span className="code">{cfg.trackerKey}</span></span>
        <div className="spacer" />
        <button className="btn" onClick={refresh} disabled={syncState.syncing}>{syncState.syncing ? "Syncing..." : "Refresh"}</button>
        <button className="btn" onClick={resetDay}>Reset Day</button>
        <button className="btn ghost" onClick={disconnect}>Disconnect</button>
      </div>

      <div className="wrap">
        <div className="grid3">
          <div className="card stat">
            <div className="num">{counts.total}</div>
            <div className="label">Total processed</div>
          </div>
          <div className="card stat">
            <div className="num" style={{color:"#fecaca"}}>{counts.closed}</div>
            <div className="label">Closed</div>
          </div>
          <div className="card stat">
            <div className="num" style={{color:"#bfdbfe"}}>{counts.chased}</div>
            <div className="label">Chased</div>
          </div>
        </div>

        <div className="card" style={{marginTop:12}}>
          <div className="row" style={{marginBottom:10}}>
            <div style={{flex:"1 1 340px"}}>
              <div className="small" style={{marginBottom:6,fontWeight:800,letterSpacing:.7,textTransform:"uppercase"}}>Ticket number</div>
              <input className="input" value={input} onChange={e=>setInput(e.target.value)} placeholder="e.g. INC0012345" />
            </div>
            <div className="row">
              <button className="btn red" onClick={()=>add("Closed")} disabled={syncState.syncing}>Mark as Closed</button>
              <button className="btn blue" onClick={()=>add("Chased")} disabled={syncState.syncing}>Mark as Chased</button>
            </div>
          </div>

          <div className="tabs">
            {["All","Closed","Chased"].map(t=>(
              <div key={t} className={"tab "+(filter===t?"active":"")} onClick={()=>setFilter(t)}>{t}</div>
            ))}
            <div className="spacer" />
            <div className="small">{shown.length} ticket(s)</div>
          </div>

          <div className="ticketList">
            {shown.length===0 ? (
              <div className="muted" style={{padding:"16px 4px"}}>No tickets logged yet - add your first one above.</div>
            ) : shown.map(t=>(
              <div className="ticket" key={t.id}>
                <div className="left">
                  <span className={"badge "+((t.status||"").toLowerCase()==="closed"?"closed":"chased")}>{(t.status||"").toUpperCase()}</span>
                  <span className="code">{t.number}</span>
                </div>
                <div className="small">{prettyTime(t.time)}</div>
              </div>
            ))}
          </div>
        </div>

        <div className="card" style={{marginTop:12}}>
          <div className="row" style={{justifyContent:"space-between"}}>
            <div>
              <div style={{fontWeight:900}}>End of Day Report</div>
              <div className="small">Includes today's tickets (UTC date).</div>
            </div>
            <div className="row">
              <button className="btn" onClick={copyReport}>Copy</button>
              <button className="btn" onClick={exportTxt}>Export .txt</button>
            </div>
          </div>
          <pre style={{marginTop:12,whiteSpace:"pre-wrap",background:"rgba(0,0,0,.25)",border:"1px solid var(--border)",borderRadius:12,padding:12,color:"var(--text)",fontSize:12}}>
{endOfDayReport}
          </pre>

          <div style={{marginTop:10}}>
            {syncState.error ? <div className="err">{syncState.error}</div> : (
              <div className="small">
                {syncState.last ? <>Last sync: {prettyTime(syncState.last)}</> : "Not synced yet."}
              </div>
            )}
          </div>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
